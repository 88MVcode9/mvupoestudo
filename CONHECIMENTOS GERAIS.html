<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONHECIMENTOS GERAIS</title>
    <link rel="icon" type="image/png" href="/imagens/banner.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4af37;
            --gold-light: #f4d03f;
            --gold-dark: #b8941e;
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --border: #2a2a2a;
            --text-light: #e8e8e8;
            --text-dim: #888;
        }

        body {
            background: radial-gradient(ellipse at top, #1a1a1a 0%, var(--bg-dark) 50%);
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(212, 175, 55, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .header h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .header-line {
            height: 3px;
            width: 100px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0 auto 1.5rem;
            box-shadow: 0 0 10px var(--gold);
        }

        .header p {
            color: var(--text-dim);
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .card-container {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .card-container:nth-child(1) { animation-delay: 0.05s; }
        .card-container:nth-child(2) { animation-delay: 0.1s; }
        .card-container:nth-child(3) { animation-delay: 0.15s; }
        .card-container:nth-child(4) { animation-delay: 0.2s; }
        .card-container:nth-child(5) { animation-delay: 0.25s; }
        .card-container:nth-child(6) { animation-delay: 0.3s; }
        .card-container:nth-child(7) { animation-delay: 0.35s; }
        .card-container:nth-child(8) { animation-delay: 0.4s; }
        .card-container:nth-child(9) { animation-delay: 0.45s; }

        .card {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, var(--bg-card) 0%, #0d0d0d 100%);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem 1.5rem;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 
                0 8px 30px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(212, 175, 55, 0.2),
                inset 0 1px 0 rgba(212, 175, 55, 0.2);
        }

        .card-corner {
            position: absolute;
            width: 12px;
            height: 12px;
            border: 2px solid var(--gold);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover .card-corner {
            opacity: 0.8;
            width: 16px;
            height: 16px;
        }

        .corner-tl { top: 8px; left: 8px; border-right: none; border-bottom: none; }
        .corner-tr { top: 8px; right: 8px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 8px; left: 8px; border-right: none; border-top: none; }
        .corner-br { bottom: 8px; right: 8px; border-left: none; border-top: none; }

        .card-icon {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card-icon svg {
            width: 100%;
            height: 100%;
            stroke: var(--text-dim);
            fill: none;
            stroke-width: 1.5;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            filter: drop-shadow(0 0 0 transparent);
        }

        .card:hover .card-icon {
            transform: scale(1.1) translateY(-4px);
        }

        .card:hover .card-icon svg {
            stroke: var(--gold);
            filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.6));
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gold);
            text-align: center;
            transition: all 0.3s ease;
            z-index: 2;
            line-height: 1.4;
        }

        .card:hover .card-title {
            color: var(--gold-light);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .card-details {
            width: 100%;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            padding-top: 1rem;
            margin-top: auto;
            z-index: 2;
        }

        .card-stat {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
        }

        .card-stat span:last-child {
            color: var(--gold);
            font-weight: 600;
        }

        .footer {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-top: 4rem;
            opacity: 0.6;
        }

        .footer p {
            margin-top: 0.5rem;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 1.5rem 1rem;
            }
            
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 1.5rem;
            }

            .card {
                padding: 1.5rem 1rem;
            }

            .card-icon {
                width: 64px;
                height: 64px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Estudos CONHECIMENTOS GERAIS</h1>
            <div class="header-line"></div>
            <p>Preparação é a chave para o sucesso no concurso</p>
        </div>

        <div class="grid" id="cardsGrid"></div>

        <footer class="footer">
            <p>&copy; <span id="year"></span> - Força e fé</p>
        </footer>
    </div>

    <script>
        const subjects = [
         
            {
                id: "direito-processo-penal",
                name: "Direito Penal e Processo Penal",
                icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    <path d="M12 8v4"/>
                    <path d="M12 16h.01"/>
                </svg>`,
                url: "https://88mvcodeup9.github.io/AVISO01/",
                category: "Direito"
            },
            {
                id: "direito-constitucional",
                name: "Direito Constitucional e Direitos Humanos",
                icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3v18"/>
                    <path d="M5 7h14"/>
                    <path d="M5 12h14"/>
                    <path d="M5 17h14"/>
                    <path d="M3 3h18v18H3z"/>
                </svg>`,
                url: "https://88mvcodeup9.github.io/AVISO01/",
                category: "Direito"
            },
            {
                id: "direito-administrativo",
                name: "Direito Administrativo",
                icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 3h18v18H3z"/>
                    <path d="M8 7h8"/>
                    <path d="M8 12h8"/>
                    <path d="M8 17h8"/>
                </svg>`,
                url: "https://88mvcodeup9.github.io/D.administrativo/",
                category: "Direito"
            },
            {
                id: "matematica",
                name: "Matemática",
                icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <path d="M7 7h10"/>
                    <path d="M7 12h10"/>
                    <path d="M7 17h10"/>
                </svg>`,
                url: "https://88mvcodeup9.github.io/AVISO01/",
                category: "Exatas"
            },
            {
                id: "portugues",
                name: "Português",
                icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>`,
                url: "https://88mvcodeup9.github.io/AVISO01/",
                category: "Linguagens"
            },
            {
                id: "informatica",
                name: "Informática",
                icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <line x1="8" y1="21" x2="16" y2="21"/>
                    <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>`,
                url: "https://88mvcodeup9.github.io/AVISO01/",
                category: "Tecnologia"
            },
            {
                id: "direito-legislativo",
                name: "Legislação Específica",
                icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="12" y1="18" x2="12" y2="12"/>
                    <line x1="9" y1="15" x2="15" y2="15"/>
                </svg>`,
                url: "https://88mvcodeup9.github.io/AVISO01/",
                category: "Direito"
            }
        ];

        function createCard(subject) {
            return `
                <div class="card-container">
                    <div class="card" onclick="window.open('${subject.url}', '_blank')">
                        <div class="card-corner corner-tl"></div>
                        <div class="card-corner corner-tr"></div>
                        <div class="card-corner corner-bl"></div>
                        <div class="card-corner corner-br"></div>
                        
                        <div class="card-icon">${subject.icon}</div>
                        <div class="card-title">${subject.name}</div>
                        <div class="card-details">
                            <div class="card-stat">
                                <span>Categoria</span>
                                <span>${subject.category}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        const grid = document.getElementById('cardsGrid');
        grid.innerHTML = subjects.map(subject => createCard(subject)).join('');
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
