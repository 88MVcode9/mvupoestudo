<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./imagens/banner.png">
    <title>SELEÇÃO DE MATERIAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #0f1419 0%, #1a2332 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .page-title {
            font-size: 3rem;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInDown 0.8s ease-out;
            position: relative;
            z-index: 1;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
            position: relative;
            z-index: 1;
        }

        .main {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1200px;
            width: 100%;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .card-link {
            text-decoration: none;
            color: inherit;
            display: block;
            animation: fadeInUp 0.6s ease-out both;
        }

        .card-link:nth-child(1) { animation-delay: 0.3s; }
        .card-link:nth-child(2) { animation-delay: 0.4s; }
        .card-link:nth-child(3) { animation-delay: 0.5s; }

        .card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.1), transparent);
            transition: left 0.5s;
        }

        .card:hover::before {
            left: 100%;
        }

        .card::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.08) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .card:hover::after {
            width: 400px;
            height: 400px;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: rgba(255, 215, 0, 0.4);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.15),
                        0 0 30px rgba(255, 215, 0, 0.08);
        }

        .icon-wrapper {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 165, 0, 0.2) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
            transition: all 0.4s ease;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .card:hover .icon-wrapper {
            transform: rotateY(180deg) scale(1.05);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3) 0%, rgba(255, 165, 0, 0.3) 100%);
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .icon-wrapper svg {
            width: 50px;
            height: 50px;
            fill: #FFD700;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3));
        }

        .card:hover .icon-wrapper svg {
            fill: #FFA500;
            transform: scale(1.05);
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.5));
        }

        .card-content {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .card:hover .card-title {
            color: #FFD700;
            transform: scale(1.02);
        }

        .card-subtitle {
            font-size: 1rem;
            font-weight: 300;
            color: #94a3b8;
            transition: all 0.3s ease;
        }

        .card:hover .card-subtitle {
            color: #cbd5e1;
        }

        .card-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #0f1419;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.4s ease;
            z-index: 2;
        }

        .card:hover .card-badge {
            opacity: 1;
            transform: translateX(0);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 0.95rem;
                margin-bottom: 40px;
            }

            .main {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .card {
                min-height: 250px;
            }

            .icon-wrapper {
                width: 80px;
                height: 80px;
            }

            .icon-wrapper svg {
                width: 40px;
                height: 40px;
            }

            .card-title {
                font-size: 1.3rem;
            }
        }

        /* Efeito de partículas no fundo */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <h1 class="page-title">Escolha a Matéria</h1>
    <p class="subtitle">Selecione uma categoria para começar seus estudos</p>

    <div class="main">
        <!-- Card 1: Conhecimentos Gerais -->
        <a href="./CONHECIMENTOS GERAIS.html" class="card-link"">
            <div class="card">
                <span class="card-badge">Popular</span>
                <div class="icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <div class="card-content">
                    <h2 class="card-title">Conhecimentos</h2>
                    <p class="card-subtitle">Gerais</p>
                </div>
            </div>
        </a>

        <!-- Card 2: Conhecimentos Regionais -->
        <a href="./CONHECIMENTOS REGIONAIS.html" class="card-link">
            <div class="card">
                <span class="card-badge">Destaque</span>
                <div class="icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                </div>
                <div class="card-content">
                    <h2 class="card-title">Conhecimentos</h2>
                    <p class="card-subtitle">Regionais</p>
                </div>
            </div>
        </a>

        <!-- Card 3: Legislação Específica -->
        <a href="./LEGISLAÇÃO ESPECÍFICA.html" class="card-link">
            <div class="card">
                <span class="card-badge">Essencial</span>
                <div class="icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                    </svg>
                </div>
                <div class="card-content">
                    <h2 class="card-title">Legislação</h2>
                    <p class="card-subtitle">Específica</p>
                </div>
            </div>
        </a>
    </div>

    <script>
        // Configure os links aqui
        document.getElementById('link-gerais').href = 'https://exemplo.com/gerais';
        document.getElementById('link-regionais').href = 'https://exemplo.com/regionais';
        document.getElementById('link-legislacao').href = 'https://exemplo.com/legislacao';

        // Efeito de partículas animadas
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const size = Math.random() * 5 + 2;
            const startX = Math.random() * window.innerWidth;
            const duration = Math.random() * 10 + 15;
            
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = startX + 'px';
            particle.style.bottom = '-10px';
            particle.style.background = `rgba(255, 215, 0, ${Math.random() * 0.3 + 0.1})`;
            particle.style.animation = `float ${duration}s linear`;
            
            document.body.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, duration * 1000);
        }

        // Criar partículas periodicamente (menos frequente)
        setInterval(createParticle, 1500);
    </script>
</body>
</html>
