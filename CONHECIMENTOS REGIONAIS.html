<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONHECIMENTOS REGIONAIS</title>
    <link rel="icon" type="image/png" href="./imagens/banner.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d4ff;
            --primary-light: #4de4ff;
            --primary-dark: #00a3cc;
            --bg-dark: #0a0e1a;
            --bg-card: #0f1419;
            --border: #1a2332;
            --text-light: #e8f0f7;
            --text-dim: #7a8a9e;
        }

        body {
            background: radial-gradient(ellipse at top, #141b2e 0%, var(--bg-dark) 50%);
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .header h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 50%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        .header-line {
            height: 3px;
            width: 100px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            margin: 0 auto 1.5rem;
            box-shadow: 0 0 10px var(--primary);
        }

        .header p {
            color: var(--text-dim);
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .card-container {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .card-container:nth-child(1) { animation-delay: 0.05s; }
        .card-container:nth-child(2) { animation-delay: 0.1s; }
        .card-container:nth-child(3) { animation-delay: 0.15s; }
        .card-container:nth-child(4) { animation-delay: 0.2s; }
        .card-container:nth-child(5) { animation-delay: 0.25s; }
        .card-container:nth-child(6) { animation-delay: 0.3s; }
        .card-container:nth-child(7) { animation-delay: 0.35s; }
        .card-container:nth-child(8) { animation-delay: 0.4s; }
        .card-container:nth-child(9) { animation-delay: 0.45s; }

        .card {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, var(--bg-card) 0%, #0a0d12 100%);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem 1.5rem;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 
                0 8px 30px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(0, 212, 255, 0.2),
                inset 0 1px 0 rgba(0, 212, 255, 0.2);
        }

        .card-corner {
            position: absolute;
            width: 12px;
            height: 12px;
            border: 2px solid var(--primary);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover .card-corner {
            opacity: 0.8;
            width: 16px;
            height: 16px;
        }

        .corner-tl { top: 8px; left: 8px; border-right: none; border-bottom: none; }
        .corner-tr { top: 8px; right: 8px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 8px; left: 8px; border-right: none; border-top: none; }
        .corner-br { bottom: 8px; right: 8px; border-left: none; border-top: none; }

        .card-icon {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card-icon img{
    width: 80px;
    height: 80px;
    object-fit: contain;
    transition: all 0.4s;
}

        .card:hover .card-icon {
            transform: scale(1.1) translateY(-4px);
        }

        .card:hover .card-icon svg {
            stroke: var(--primary);
            filter: drop-shadow(0 0 12px rgba(0, 212, 255, 0.6));
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--primary);
            text-align: center;
            transition: all 0.3s ease;
            z-index: 2;
            line-height: 1.4;
        }

        .card:hover .card-title {
            color: var(--primary-light);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .card-details {
            width: 100%;
            border-top: 1px solid rgba(0, 212, 255, 0.15);
            padding-top: 1rem;
            margin-top: auto;
            z-index: 2;
        }

        .card-stat {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
        }

        .card-stat span:last-child {
            color: var(--primary);
            font-weight: 600;
        }

        .footer {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-top: 4rem;
            opacity: 0.6;
        }

        .footer p {
            margin-top: 0.5rem;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 1.5rem 1rem;
            }
            
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 1.5rem;
            }

            .card {
                padding: 1.5rem 1rem;
            }

            .card-icon {
                width: 64px;
                height: 64px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Estudos CONHECIMENTOS REGIONAIS</h1>
            <div class="header-line"></div>
            <p>Preparação é a chave para o sucesso no concurso</p>
        </div>

        <div class="grid" id="cardsGrid"></div>

        <footer class="footer">
            <p>&copy; <span id="year"></span> - Força e fé</p>
        </footer>
    </div>

    <script>
       const subjects = [
    {
        id: "historia-alagoas",
        name: "História de Alagoas",
        icon: `<img src="https://upload.wikimedia.org/wikipedia/commons/8/88/Bandeira_de_Alagoas.svg" style="width:80px;height:80px;object-fit:contain;">`,
        url: "https://88mvcodeup9.github.io/AVISO01/",
        category: "Alagoas"
    },
    {
        id: "geografia-alagoas",
        name: "Geografia de Alagoas",
        icon: `<img src="https://upload.wikimedia.org/wikipedia/commons/8/88/Bandeira_de_Alagoas.svg" style="width:80px;height:80px;object-fit:contain;">`,
        url: "https://88mvcodeup9.github.io/AVISO01/",
        category: "Alagoas"
    },
    {
        id: "historia-bahia",
        name: "História da Bahia",
        icon: `<img src="https://upload.wikimedia.org/wikipedia/commons/2/28/Bandeira_da_Bahia.svg" style="width:80px;height:80px;object-fit:contain;">`,
        url: "https://88mvcodeup9.github.io/AVISO01/",
        category: "Bahia"
    },
    {
        id: "geografia-bahia",
        name: "Geografia da Bahia",
        icon: `<img src="https://upload.wikimedia.org/wikipedia/commons/2/28/Bandeira_da_Bahia.svg" style="width:80px;height:80px;object-fit:contain;">`,
        url: "https://88mvcodeup9.github.io/AVISO01/",
        category: "Bahia"
    }
];

        function createCard(subject) {
            return `
                <div class="card-container">
                    <div class="card" onclick="window.open('${subject.url}', '_blank')">
                        <div class="card-corner corner-tl"></div>
                        <div class="card-corner corner-tr"></div>
                        <div class="card-corner corner-bl"></div>
                        <div class="card-corner corner-br"></div>
                        
                        <div class="card-icon">${subject.icon}</div>
                        <div class="card-title">${subject.name}</div>
                        <div class="card-details">
                            <div class="card-stat">
                                <span>Categoria</span>
                                <span>${subject.category}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        const grid = document.getElementById('cardsGrid');
        grid.innerHTML = subjects.map(subject => createCard(subject)).join('');
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
